<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notas de Plantão</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #1c1c1c;
      position: sticky;
      top: 0;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #ff4444;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

   
    .clearFilter {
      background: #555;
    }

    .list {
      padding: 10px;
    }

    .card {
      background: #222;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 30px;
      background: #00c853;
      color: white;
      border: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      padding: 20px;
      gap: 10px;
    }

    .modal input {
      height: 40px;
    }

    .modal textarea {
      height: 550px;
    }

    .modal input, .modal textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    .tag {
      color: #00e5ff;
      margin-right: 6px;
      cursor: pointer;
    }

    .tag.active {
      background: #00e5ff;
      color: #000;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .pin {
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <input id="search" placeholder="Buscar #tag ou paciente">
  <button class="clearFilter" onclick="clearFilter()">Limpar Busca</button>
  <button onclick="clearAll()">Encerrar Plantão</button>
</header>

<div class="list" id="list"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal">
  <input id="paciente" placeholder="Paciente">
  <input id="leito" placeholder="Leito">
  <textarea id="nota" placeholder="Notas (#tag)"></textarea>
  <button onclick="closeModal()">Salvar</button>
</div>

<script src="app.js"></script>

</body>
</html>
